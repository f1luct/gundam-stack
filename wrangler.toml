name = "gundam-stack"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# 注：原本想用 Cron 定时清理，但当前 OAuth 令牌无 schedules 权限(403)，
# 改为「加载列表时惰性清理」(见 src/index.ts 的 purgePosted)。
# 若以后拿到带 Workers Scripts:Edit 的 API Token，可恢复下面两行启用 Cron：
# [triggers]
# crons = ["0 3 * * *"]

# 自定义域名：fluct.dev 已在你的 Cloudflare 账号里，部署时会自动建 DNS 记录 + 签发证书。
# 想换子域名就改 pattern 这一行。前提：gundam.fluct.dev 上不能已有别的 CNAME 记录。
[[routes]]
pattern = "gundam.fluct.dev"
custom_domain = true

# 前端静态文件 (public/) 由 Worker 一并托管；/api/* 不匹配静态文件，会进入 Worker 处理。
[assets]
directory = "./public"
binding = "ASSETS"

# D1 数据库：先运行  npx wrangler d1 create gundam-stack  把返回的 database_id 填到下面
[[d1_databases]]
binding = "DB"
database_name = "gundam-stack"
database_id = "6e380e03-6f1b-438a-8a07-61e28c829b8d"

# 图片存储：R2（2026-07-02 从 KV 迁入）
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "gundam-stack-images"

# KV 只放系统小键值（news 拉取节流时间戳等 sys: 键），不再存图片
[[kv_namespaces]]
binding = "IMAGES"
id = "e664c27613f6420b8655aa02fedc8b2e"

# 直发微博：N150 发布服务的隧道地址（cloudflared tunnel gundam-pub，跑在 N150 上）
[vars]
PUB_URL = "https://gundam-pub.fluct.dev"

# 机密用 `wrangler secret put` 设置，不要写在这里：
#   npx wrangler secret put PUB_TOKEN          直发微博服务的共享密钥(与 N150 config.json 一致)
#   npx wrangler secret put APP_PASSWORD       登录密码
#   npx wrangler secret put DEEPSEEK_API_KEY   翻译用的 DeepSeek key (platform.deepseek.com)
#   npx wrangler secret put SESSION_SECRET     (可选) 会话签名随机串；不设则用 APP_PASSWORD 派生
