<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0e14" />
    <title>高达暂存站 · MS CONTROL</title>
    <!-- 在 CSS 之前定好主题，避免亮色用户开页闪黑 -->
    <script>
      (function () {
        var t = 'dark';
        try { t = localStorage.getItem('gs_theme') || 'dark'; } catch (e) {}
        document.documentElement.dataset.theme = t;
        if (t === 'light') {
          document.querySelector('meta[name="theme-color"]').content = '#e3e7ec';
        }
      })();
    </script>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M0 0H32V22L22 32H0Z' fill='%23e5342a'/%3E%3Ctext x='15' y='24' font-family='monospace' font-size='21' font-weight='700' fill='%23fff' text-anchor='middle'%3EG%3C/text%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="scanlines" aria-hidden="true"></div>
    <div id="app"></div>
    <div id="toast" class="toast" hidden></div>
    <script src="/app.js"></script>
  </body>
</html>
